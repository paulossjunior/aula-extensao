site_name: Curso de Extensão — Desenvolvimento de Produto
site_description: Documentação oficial do curso de extensão focado em Lean Startup e Hipótese.
site_author: Paulo Junior
docs_dir: docs
theme:
  name: material
  language: pt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - toc.integrate
plugins:
  - search:
      lang: pt
  - mermaid2
nav:
  - Início: index.md
  - Plano de Aula:
    - Visão Geral: plano-de-aula/index.md
    - Aulas Práticas:
      - Aula 01 — 09/03/2026: plano-de-aula/aulas/aula-01-2026-03-09.md
      - Aula 02 — 16/03/2026: plano-de-aula/aulas/aula-02-2026-03-16.md
      - Aula 03 — 23/03/2026: plano-de-aula/aulas/aula-03-2026-03-23.md
      - Aula 04 — 30/03/2026: plano-de-aula/aulas/aula-04-2026-03-30.md
      - Aula 05 — 06/04/2026: plano-de-aula/aulas/aula-05-2026-04-06.md
  - Avaliação: avaliacao/avaliacao.md
  - Cronograma: cronograma/cronograma.md
  - Materiais de Apoio: materiais/index.md
  - Modelos:
      - Template PRD: modelos/prd-template.md
      - Template Geral de Aula: modelos/template.md
      - Template de Planejamento Scrum: modelos/scrum-planejamento-template.md
      - Exemplo de Planejamento Scrum: modelos/scrum-planejamento-exemplo.md
      - Template de DSM: modelos/dsm-template.md
      - Exemplo de DSM: modelos/dsm-exemplo.md
      - Exemplo de DSM com Loop: modelos/dsm-exemplo-loop-erro.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
